name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Run Tests
    strategy:
      fail-fast: false
      matrix:
        go-version: ["1.24.x", "1.25.x"] # Standardized to current stable Go versions
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true
          
      - name: Test
        run: go test -v ./...

  compatibility-build:
    name: Cross-Compile Build
    needs: test
    strategy:
      fail-fast: false
      matrix:
        go-version: ["1.25.x"] 
        platform:
          - os: ubuntu-latest
            arch: amd64
          - os: ubuntu-latest
            arch: "386"
          - os: ubuntu-latest
            arch: arm64
          - os: macos-latest
            arch: amd64
          - os: macos-latest
            arch: arm64
          - os: windows-latest
            arch: amd64
          - os: windows-latest
            arch: "386"
    runs-on: ${{ matrix.platform.os }}
    env:
      GOARCH: ${{ matrix.platform.arch }}
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
          cache: true
          
      - name: Build
        run: go build ./...