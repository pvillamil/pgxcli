name: Release

on:
  push:
    tags:
      - "v*.*.*"
    workflow_dispatch: # manual trigger for testing

# Required for creating GitHub Releases and pushing to repos
permissions:
  contents: write

jobs:
  # ──────────────────────────────────────────────
  # Build: Linux (amd64 + arm64)
  # Publishes: AUR, deb, rpm, apk, archlinux packages
  # ──────────────────────────────────────────────
  build-linux:
    name: Build / Linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Install ARM64 cross-compiler
        run: sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Build and publish (Linux)
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --config .goreleaser-linux.yaml --skip=publish,announce,validate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-linux
          path: dist/
          retention-days: 1

  # ──────────────────────────────────────────────
  # Build: macOS (amd64 + arm64)
  # Publishes: Homebrew Cask
  # Note: clang (LLVM) on macOS handles both arches natively
  # ──────────────────────────────────────────────
  build-darwin:
    name: Build / macOS
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Build and publish (macOS)
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --config .goreleaser-darwin.yaml --skip=publish,announce,validate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-darwin
          path: dist/
          retention-days: 1

  # ──────────────────────────────────────────────
  # Build: Windows (amd64 + arm64)
  # Publishes: Chocolatey, winget
  # Uses: MinGW cross-compiler on Windows runner
  # ──────────────────────────────────────────────
  build-windows:
    name: Build / Windows
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Build and publish (Windows)
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --config .goreleaser-windows.yaml --skip=publish,announce,validate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHOCOLATEY_API_KEY: ${{ secrets.CHOCOLATEY_API_KEY }}
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-windows
          path: dist/
          retention-days: 1

  # ──────────────────────────────────────────────
  # Release: Merge all artifacts → GitHub Release
  # Skips build — uses pre-built artifacts from above jobs
  # ──────────────────────────────────────────────
  release:
    name: Release
    needs: [build-linux, build-darwin, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-linux
          path: dist/

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-darwin
          path: dist/

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-windows
          path: dist/

      - name: Create GitHub Release
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --skip=build,validate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
          CHOCOLATEY_API_KEY: ${{ secrets.CHOCOLATEY_API_KEY }}