# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# vim: set ts=2 sw=2 tw=0 fo=cnqoj

version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: "pgxcli-linux"
    main: "./cmd/pgxcli"
    binary: "pgxcli"
    env:
      - CGO_ENABLED=1
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
    overrides:
      - goos: linux
        goarch: arm64
        env:
          - CGO_ENABLED=1
          - CC=aarch64-linux-gnu-gcc
          - CXX=aarch64-linux-gnu-g++

archives:
  - id: default
    formats: ["tar.gz"]
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    files:
      - "LICENSE"
      - "README.md"

nfpms:
  - id: default
    vendor: "Balaji J"
    maintainer: "Balaji J <balaji.jothi.in@gmail.com>"
    description: "An interactive PostgreSQL CLI written in Go"
    homepage: "https://github.com/Balaji01-4D/pgxcli"
    license: "MIT"
    formats:
      - deb
      - rpm
      - apk
      - archlinux
    bindir: /usr/bin
    dependencies:
      - less

aurs:
  - homepage: "https://github.com/Balaji01-4D/pgxcli"
    description: "An interactive PostgreSQL CLI written in Go"
    license: "MIT"
    maintainers:
      - "Balaji J <balaji.jothi.in@gmail.com>"
    contributors:
      - "Balaji J <balaji.jothi.in@gmail.com>"
    private_key: "{{ .Env.AUR_SSH_PRIVATE_KEY }}"
    git_url: "ssh://aur@aur.archlinux.org/{{ .ProjectName }}-bin.git"
    depends:
      - less
    package: |-
      # bin
      install -Dm755 "./{{ .ProjectName }}" "${pkgdir}/usr/bin/{{ .ProjectName }}"

      # license
      install -Dm644 "./LICENSE" "${pkgdir}/usr/share/licenses/{{ .ProjectName }}/LICENSE"
    commit_author:
      name: "Balaji J"
      email: "balaji.jothi.in@gmail.com"

checksum:
  name_template: "checksums-linux.txt"